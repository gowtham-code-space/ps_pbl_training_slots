services:
  mysql:
    image: mysql:8.0
    container_name: slot_matrix_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "3308:3306"
    networks:
      - slot_matrix_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: slot_matrix_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: https://pcdp.bitsathy.ac.in/slot-matrix
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-10}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY}
      UPLOAD_PATH: /opt/uploads/slot-matrix
    volumes:
      - /opt/uploads/slot-matrix:/opt/uploads/slot-matrix
    ports:
      - "5002:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - slot_matrix_net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://pcdp.bitsathy.ac.in/slot-matrix/api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: slot_matrix_frontend
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      - backend
    networks:
      - slot_matrix_net

volumes:
  mysql_data:

networks:
  slot_matrix_net:
    driver: bridge
  reverse-proxy:
    external: true
